<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <style>
    /* Animación fluida para el ancho del sidebar */
    .sidebar-transition {
    transition: margin-left 0.3s ease-in-out, min-width 0.3s ease-in-out, max-width 0.3s ease-in-out;
    min-width: 250px;
    max-width: 250px;
    }

    /* Clase que aplicará JavaScript para ocultar la barra */
    .sidebar-hidden {
    margin-left: -250px !important;
    }
    </style>
</head>

<body class="d-flex flex-column vh-100 overflow-hidden">

  <!-- 1. Barra de Navegación Superior -->
  <nav class="navbar navbar-dark bg-dark px-3" style="height: 56px;">
    <div class="d-flex align-items-center">
      <!-- BOTÓN PARA COLAPSAR -->
      <button id="sidebarToggle" class="btn btn-outline-light me-3" type="button">
        &#9776; <!-- Icono de hamburguesa -->
      </button>
      <span class="navbar-brand mb-0 h1">Mi Panel</span>
    </div>
  </nav>

  <!-- 2. Contenedor Principal -->
  <div class="d-flex flex-row flex-grow-1" style="height: calc(100vh - 56px);">

    <!-- 3. Barra Lateral (Sidebar) con clase de transición -->
    <aside id="sidebar" class="bg-light border-end d-flex flex-column p-3 sidebar-transition overflow-x-auto">
      <ul class="nav nav-pills flex-column mb-auto">
        <li class="nav-item">
          <a href="#" class="nav-link active">Inicio</a>
        </li>
        <li>
          <a href="#" class="nav-link link-dark">Proyectos</a>
        </li>
        <li>
          <a href="#" class="nav-link link-dark">Configuración</a>
        </li>
      </ul>
      <hr>
      <div class="dropdown">
        <span class="d-flex align-items-center link-dark text-decoration-none">
          <strong>Usuario</strong>
        </span>
      </div>
    </aside>

    <!-- 4. Contenido Central (Se expande automáticamente) -->
    <main class="flex-grow-1 p-4 overflow-auto bg-white">
      <h2>Contenido Principal</h2>
      <p>Al presionar el botón del menú superior, la barra lateral se deslizará suavemente hacia la izquierda.</p>
    </main>

  </div>

  <!-- JavaScript para activar el movimiento -->
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const toggleBtn = document.getElementById('sidebarToggle');
      const sidebar = document.getElementById('sidebar');

      toggleBtn.addEventListener('click', function() {
        // Alterna la clase que empuja el sidebar hacia la izquierda
        sidebar.classList.toggle('sidebar-hidden');
      });
    });
  </script>
</body>
</html>
